name: "Lock threads"

permissions: {}

on:
  schedule:
    - cron: '11 11 * * 1'

jobs:
  lock:
    permissions:
      issues: write
      pull-requests: write
      discussions: write
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@89ae32b08ed1a541efecbab17912962a5e38981c # v6.0.2
        with:
          github-token: ${{ github.token }}
          issue-inactive-days: "90"
          issue-lock-reason: ""
          pr-inactive-days: "90"
          pr-lock-reason: ""
          discussion-inactive-days: "90"
